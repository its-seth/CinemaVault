<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles/login.css">
        <link rel="stylesheet" href="styles/register.css">
    </head>
    <body>
        <div class="navbar">
            <img class="logo" src="images/the correct logo.jpg">  
        </div>
        <div class="wrapper-reg">
            <div class="login-box">
                <h2>Register</h2>
                <form action="php/register.php" method="POST">
                    <div class="input-box">
                        <span class="icon"></span>
                        <input type="email" name="email" required placeholder="Email">
                    </div>
                    <div class="input-box">
                        <span class="icon"></span>
                        <input type="text" name="username" required placeholder="User Name">
                    </div>

                    <div class="input-box">
                        <span class="icon"></span>
                        <input type="password" name="password" required placeholder="Password">
                    </div>

                    <div class="forgot-password">
                        <label><input type="checkbox" name="terms">I agree with terms & conditions</label>
                    </div>
                    <button type="submit" class="login-btn">Register</button>
                    <div class="register">
                        <p>Already have an account?<a href="login.html" class="register-link"><br>Login</a></p>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
